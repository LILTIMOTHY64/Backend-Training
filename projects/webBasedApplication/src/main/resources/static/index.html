<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Employee Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <div class="login-logo">🏢</div>
        <h1>Employee Management</h1>
        <p class="subtitle">Sign in to access the system</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group" style="margin-bottom:1rem;">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username"
                       required autocomplete="username">
            </div>
            <div class="form-group" style="margin-bottom:1.5rem;">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password"
                       required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary"
                    style="width:100%;justify-content:center;" id="loginBtn">
                🔐 Sign In
            </button>
            <div id="loginMsg"></div>
        </form>

        <p class="login-hint">
            <strong>Admin</strong>: admin / admin123 &nbsp;•&nbsp;
            <strong>User</strong>: user / user123
        </p>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    /* Redirect already-authenticated users straight to the employee list */
    if (getAuthHeader()) {
        window.location.replace('/employees.html');
    }

    async function handleLogin(e) {
        e.preventDefault();
        clearMsg('loginMsg');

        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const encoded  = btoa(`${username}:${password}`);
        const tempAuth = `Basic ${encoded}`;

        const loginBtn = document.getElementById('loginBtn');
        loginBtn.disabled    = true;
        loginBtn.textContent = 'Signing in…';

        try {
            /* Validate credentials against a protected endpoint */
            const res = await fetch('/employees', {
                headers: { 'Authorization': tempAuth, 'Accept': 'application/json' }
            });

            if (res.status === 401) {
                showAlert('loginMsg', 'Invalid username or password.', 'error');
                return;
            }
            if (!res.ok) {
                showAlert('loginMsg', 'Login failed — please try again.', 'error');
                return;
            }

            /* Detect role: probe admin-only POST.
               400 (validation error) → ADMIN reached the endpoint.
               403 (forbidden)        → USER role. */
            const probe = await fetch('/employees', {
                method:  'POST',
                headers: {
                    'Authorization': tempAuth,
                    'Content-Type':  'application/json',
                    'Accept':        'application/json'
                },
                body: JSON.stringify({})
            });
            const isAdmin = (probe.status !== 403);

            saveAuth(tempAuth, username, isAdmin);
            window.location.href = '/employees.html';

        } catch (err) {
            showAlert('loginMsg',
                'Could not connect to server. Is the backend running?', 'error');
        } finally {
            loginBtn.disabled  = false;
            loginBtn.innerHTML = '🔐 Sign In';
        }
    }
</script>
</body>
</html>
