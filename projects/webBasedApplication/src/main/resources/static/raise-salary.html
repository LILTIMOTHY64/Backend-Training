<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raise Salary — Employee Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="container">
    <div class="card">
        <h2 style="margin-bottom:1.25rem;">Raise Employee Salary</h2>

        <form id="raiseSalaryForm" onsubmit="handleRaiseSalary(event)">
            <div class="form-grid">

                <div class="form-group">
                    <label for="raiseEmpName">Employee Name</label>
                    <input type="text" id="raiseEmpName"
                           placeholder="Enter exact employee name" required>
                    <span class="field-hint">Name is case-insensitive</span>
                </div>

                <div class="form-group">
                    <label for="raisePercent">Raise Percentage</label>
                    <input type="number" id="raisePercent"
                           min="1" max="10" placeholder="e.g. 5" required>
                    <span class="field-hint">Between 1% and 10% allowed</span>
                </div>

                <div class="form-group full">
                    <button type="submit" class="btn btn-warning" id="raiseBtn">
                        💰 Apply Raise
                    </button>
                </div>

            </div>

            <div id="raiseSalaryMsg"></div>
        </form>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    /* Guard — Admin only; redirects non-admins to employees list */
    if (!checkAdminAuth()) { /* checkAdminAuth handles redirect */ }

    document.addEventListener('DOMContentLoaded', () => {
        renderHeader('headerContainer');
    });

    /* ── Apply salary raise ───────────────────────────────── */
    async function handleRaiseSalary(e) {
        e.preventDefault();
        clearMsg('raiseSalaryMsg');

        const btn = document.getElementById('raiseBtn');
        btn.disabled    = true;
        btn.textContent = 'Applying…';

        const body = {
            name:    document.getElementById('raiseEmpName').value.trim(),
            percent: parseInt(document.getElementById('raisePercent').value, 10)
        };

        try {
            const res  = await apiFetch('/raise', { method: 'PUT', body: JSON.stringify(body) });
            const data = await parseBody(res);

            if (res.ok) {
                const msg = typeof data === 'string' ? escHtml(data) : formatError(data);
                showAlert('raiseSalaryMsg', msg, 'success');
                document.getElementById('raiseSalaryForm').reset();
            } else if (res.status === 403) {
                showAlert('raiseSalaryMsg', 'Access denied — Admin role required.', 'error');
            } else {
                showAlert('raiseSalaryMsg', formatError(data), 'error');
            }

        } catch (err) {
            showAlert('raiseSalaryMsg', 'Error connecting to server.', 'error');
        } finally {
            btn.disabled  = false;
            btn.innerHTML = '💰 Apply Raise';
        }
    }
</script>
</body>
</html>
