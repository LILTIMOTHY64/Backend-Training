<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee — Employee Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="headerContainer"></div>

<div class="container">
    <div class="card">
        <h2 style="margin-bottom:1.25rem;">Add New Employee</h2>

        <form id="addEmployeeForm" onsubmit="handleCreateEmployee(event)">
            <div class="form-grid">

                <div class="form-group">
                    <label for="empName">Full Name</label>
                    <input type="text" id="empName"
                           placeholder="e.g. John Doe" required>
                    <span class="field-hint">Alphabets only, max 2 spaces allowed</span>
                </div>

                <div class="form-group">
                    <label for="empDesignation">Designation</label>
                    <select id="empDesignation" required>
                        <option value="">— Select designation —</option>
                        <option value="Programmer">Programmer</option>
                        <option value="Tester">Tester</option>
                        <option value="Manager">Manager</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="empAge">Age</label>
                    <input type="number" id="empAge"
                           min="19" max="60" placeholder="e.g. 28" required>
                    <span class="field-hint">Must be between 19 and 60</span>
                </div>

                <div class="form-group" style="justify-content:flex-end;">
                    <div class="salary-info">
                        <strong>Auto-assigned salaries:</strong><br>
                        Programmer → ₹20,000<br>
                        Tester &nbsp;&nbsp;&nbsp;&nbsp;→ ₹15,000<br>
                        Manager &nbsp;&nbsp;→ ₹50,000
                    </div>
                </div>

                <div class="form-group full">
                    <button type="submit" class="btn btn-success" id="addEmpBtn">
                        ➕ Add Employee
                    </button>
                </div>

            </div>

            <div id="addEmployeeMsg"></div>
        </form>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    /* Guard — Admin only; redirects non-admins to employees list */
    if (!checkAdminAuth()) { /* checkAdminAuth handles redirect */ }

    document.addEventListener('DOMContentLoaded', () => {
        renderHeader('headerContainer');
    });

    /* ── Create employee ──────────────────────────────────── */
    async function handleCreateEmployee(e) {
        e.preventDefault();
        clearMsg('addEmployeeMsg');

        const btn = document.getElementById('addEmpBtn');
        btn.disabled    = true;
        btn.textContent = 'Adding…';

        const body = {
            name:        document.getElementById('empName').value.trim(),
            designation: document.getElementById('empDesignation').value,
            age:         parseInt(document.getElementById('empAge').value, 10)
        };

        try {
            const res  = await apiFetch('/employees', { method: 'POST', body: JSON.stringify(body) });
            const data = await parseBody(res);

            if (res.ok) {
                showAlert('addEmployeeMsg',
                    `Employee <strong>${escHtml(data.name)}</strong> added successfully!
                     &nbsp; ID: <strong>${data.id}</strong>
                     &bull; Salary: <strong>₹${data.salary.toLocaleString('en-IN')}</strong>`,
                    'success');
                document.getElementById('addEmployeeForm').reset();
            } else if (res.status === 403) {
                showAlert('addEmployeeMsg', 'Access denied — Admin role required.', 'error');
            } else {
                showAlert('addEmployeeMsg', formatError(data), 'error');
            }

        } catch (err) {
            showAlert('addEmployeeMsg', 'Error connecting to server.', 'error');
        } finally {
            btn.disabled  = false;
            btn.innerHTML = '➕ Add Employee';
        }
    }
</script>
</body>
</html>
