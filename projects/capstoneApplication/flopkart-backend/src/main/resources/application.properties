# ─── DataSource ──────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/flopkart?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# Use 'create' on first run to generate the schema, then switch to 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Replace with a securely generated 256-bit Base64 secret before deploying.
# Generate one with: openssl rand -base64 32
jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGZsb3BrYXJ0
jwt.access-token-expiry-ms=1800000
jwt.refresh-token-expiry-ms=604800000

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── Initialise seed data on startup ─────────────────────────────────────────
spring.sql.init.mode=never
